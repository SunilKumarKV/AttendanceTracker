services:
  - type: web
    name: attendance-tracker-api
    runtime: node
    plan: starter
    rootDir: backend
    buildCommand: npm ci && npm run prisma:generate && npm run build && npm run prisma:deploy
    startCommand: npm run start
    healthCheckPath: /api/health
    autoDeploy: false
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: SUPPORT_EMAIL
        sync: false
