name: Production Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  production-check:
    name: Build and Prisma validation
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/attendance_ci?schema=public
      NODE_ENV: test
      JWT_ACCESS_SECRET: ci-access-secret-minimum-32-characters
      JWT_REFRESH_SECRET: ci-refresh-secret-minimum-32-characters
      CLIENT_URL: http://localhost:3000
      CORS_ORIGINS: http://localhost:3000
      VITE_API_BASE_URL: http://localhost:5001/api
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: attendance_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Prisma schema
        run: pnpm prisma:validate

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Build API
        run: pnpm build:api

      - name: Build Web
        run: pnpm build:web
